name: Build, Test and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  images: ${{ env.REGISTRY }}/${{ github.repository | downcase }}

jobs:
  # 1. De test job: Linting en Image Scan
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies & Lint
        run: |
          npm install
          npm run lint  # Zorg dat dit commando in je package.json staat

      - name: Build image for testing
        run: docker build -t my-app-test .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app-test'
          format: 'table'
          exit-code: '1' # Faalt de pipeline bij kwetsbaarheden
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # 2. De build job: Pusht pas als de tests slagen
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # 3. De deploy job: Pusht pas als build slaagt
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to Hetzner VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/portfolio
            docker compose pull
            docker compose up -d
            docker image prune -f